name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as you can — it helps a lot.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click a tag node, the filter doesn't clear when I press the ✕ button."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "The tag filter should clear and all nodes should return to full opacity."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to trigger the bug.
      placeholder: |
        1. Open the landing page
        2. Click a tag node
        3. Click the ✕ button in the filter banner
        4. Nothing happens
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, any relevant details.
      placeholder: |
        - Browser: Chrome 122
        - OS: macOS 14
        - Node: 22.4.0
    validations:
      required: false

  - type: textarea
    id: extras
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, console errors — anything that helps.
    validations:
      required: false
