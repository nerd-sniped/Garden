<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" fill="#1a1a2e" rx="12"/>
  <!-- Node A -->
  <circle cx="80" cy="130" r="32" fill="#3498db" opacity="0.9"/>
  <text x="80" y="135" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">A</text>
  <!-- Node B -->
  <circle cx="200" cy="60" r="28" fill="#2ecc71" opacity="0.9"/>
  <text x="200" y="65" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">B</text>
  <!-- Node C -->
  <circle cx="200" cy="200" r="28" fill="#e74c3c" opacity="0.9"/>
  <text x="200" y="205" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">C</text>
  <!-- Node D -->
  <circle cx="320" cy="130" r="32" fill="#f39c12" opacity="0.9"/>
  <text x="320" y="135" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">D</text>
  <!-- Edges -->
  <line x1="112" y1="115" x2="172" y2="75" stroke="#7f8c8d" stroke-width="2" opacity="0.7"/>
  <line x1="112" y1="145" x2="172" y2="185" stroke="#7f8c8d" stroke-width="2" opacity="0.7"/>
  <line x1="228" y1="75" x2="288" y2="115" stroke="#7f8c8d" stroke-width="2" opacity="0.7"/>
  <line x1="228" y1="185" x2="288" y2="145" stroke="#7f8c8d" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="88" x2="200" y2="172" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="248" text-anchor="middle" fill="#95a5a6" font-family="monospace" font-size="11">Force-directed graph — example layout</text>
</svg>
