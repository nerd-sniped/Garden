<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Rust logo simplified -->
  <rect width="200" height="200" fill="#1a1a1a" rx="12"/>
  <!-- Gear ring outer -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#F74C00" stroke-width="8"/>
  <!-- Gear teeth (12 teeth) -->
  <g fill="#F74C00">
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(0 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(30 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(60 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(90 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(120 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(150 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(180 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(210 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(240 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(270 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(300 100 100)"/>
    <rect x="93" y="16" width="14" height="18" rx="2" transform="rotate(330 100 100)"/>
  </g>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="38" fill="#F74C00" opacity="0.15"/>
  <circle cx="100" cy="100" r="22" fill="#1a1a1a"/>
  <!-- "R" letter -->
  <text x="100" y="112" fill="#F74C00" font-family="Georgia, serif" font-size="36" font-weight="bold" text-anchor="middle">R</text>
  <!-- Label -->
  <text x="100" y="175" fill="#F74C00" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="3">RUST</text>
</svg>
