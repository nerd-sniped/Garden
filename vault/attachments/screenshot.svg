<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect width="480" height="300" fill="#0d1117" rx="10"/>
  <!-- Window chrome -->
  <rect width="480" height="32" fill="#161b22" rx="10"/>
  <rect y="22" width="480" height="10" fill="#161b22"/>
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <!-- Title bar text -->
  <text x="240" y="21" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11">TypeScript — type system overview</text>
  <!-- Code lines -->
  <text x="20" y="60"  fill="#ff7b72" font-family="monospace" font-size="12">interface</text>
  <text x="100" y="60" fill="#c9d1d9" font-family="monospace" font-size="12">Note</text>
  <text x="140" y="60" fill="#c9d1d9" font-family="monospace" font-size="12">{</text>
  <text x="40"  y="80" fill="#79c0ff" font-family="monospace" font-size="12">id:</text>
  <text x="70"  y="80" fill="#ff7b72" font-family="monospace" font-size="12">string</text>
  <text x="40"  y="100" fill="#79c0ff" font-family="monospace" font-size="12">title:</text>
  <text x="85"  y="100" fill="#ff7b72" font-family="monospace" font-size="12">string</text>
  <text x="40"  y="120" fill="#79c0ff" font-family="monospace" font-size="12">tags:</text>
  <text x="82"  y="120" fill="#ff7b72" font-family="monospace" font-size="12">string</text>
  <text x="128" y="120" fill="#c9d1d9" font-family="monospace" font-size="12">[]</text>
  <text x="40"  y="140" fill="#79c0ff" font-family="monospace" font-size="12">publish:</text>
  <text x="102" y="140" fill="#ff7b72" font-family="monospace" font-size="12">boolean</text>
  <text x="20"  y="160" fill="#c9d1d9" font-family="monospace" font-size="12">}</text>
  <!-- Comment block -->
  <text x="20" y="190" fill="#8b949e" font-family="monospace" font-size="11">// Strict mode: no implicit any, exhaustive unions</text>
  <text x="20" y="210" fill="#8b949e" font-family="monospace" font-size="11">// Path aliases configured in tsconfig.json</text>
  <!-- Status bar -->
  <rect x="0" y="278" width="480" height="22" fill="#161b22"/>
  <text x="12" y="292" fill="#3fb950" font-family="monospace" font-size="10">✓ TypeScript 5.9  strict  0 errors</text>
  <text x="380" y="292" fill="#8b949e" font-family="monospace" font-size="10">UTF-8  LF</text>
</svg>
